<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grading System v2.0 | Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="dashboard-active">

    <!-- Global Interactive Background -->
    <div class="app-bg">
        <div class="bg-circle c1"></div>
        <div class="bg-circle c2"></div>
        <div class="bg-circle c3"></div>
    </div>

    <!-- Toast Container -->
    <div id="toast-container"></div>

    <!-- ==================== MAIN DASHBOARD ==================== -->
    <div id="dashboard-section" class="glass-container">

        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="brand-wrapper">
                    <img src="logo.jpg" alt="Logo" class="sidebar-logo">
                    <div class="brand-text">
                        <h2>GS <span>v2.0</span></h2>
                        <small>Academic Management</small>
                    </div>
                </div>
            </div>

            <div class="sidebar-menu">
                <!-- Semester Section -->
                <div class="menu-section">
                    <div class="menu-label">
                        <i class="fa-solid fa-calendar-days"></i>
                        <span>Current Semester</span>
                    </div>
                    <div class="semester-selector-wrapper">
                        <select id="semester-select" class="glass-select">
                            <option value="">-- Select --</option>
                        </select>
                        <button class="btn-icon-plus" id="add-semester-btn" title="Add Semester">
                            <i class="fa-solid fa-plus"></i>
                        </button>
                    </div>
                </div>

                <!-- Subjects Section -->
                <div class="menu-section" id="subjects-section" style="display:none;">
                    <div class="menu-label menu-label-collapsible" id="subjects-toggle">
                        <span><i class="fa-solid fa-book"></i> Subjects</span>
                        <i class="fa-solid fa-chevron-down menu-collapse-icon"></i>
                    </div>
                    <div class="subject-list-wrapper" id="subject-list-wrapper">
                        <div id="subject-list" class="subject-list"></div>
                        <button class="btn btn-add-subject" id="add-subject-btn">
                            <i class="fa-solid fa-plus-circle"></i> Add Subject
                        </button>
                    </div>
                </div>
            </div>

            <div class="sidebar-footer">
                <div class="user-profile">
                    <img src="https://ui-avatars.com/api/?name=Admin&background=0D8ABC&color=fff" alt="User" class="avatar">
                    <div class="user-details">
                        <span id="user-email">admin@system.com</span>
                        <span class="status-badge">Online</span>
                    </div>
                </div>
            </div>
        </aside>

        <!-- Sidebar Overlay (mobile) -->
        <div class="sidebar-overlay" id="sidebar-overlay"></div>

        <!-- Main Content -->
        <main class="main-content" id="main-content">
            <header class="top-bar">
                <div class="top-bar-left">
                    <button class="sidebar-open-btn" id="sidebar-open-btn">
                        <i class="fa-solid fa-bars-staggered"></i>
                    </button>
                    <h1 id="page-title">Overview</h1>
                </div>
                
                <div class="top-bar-actions">
                    <button class="btn btn-primary btn-glow" id="add-student-btn" style="display:none;">
                        <i class="fa-solid fa-user-plus"></i>
                        <span>Add Student</span>
                    </button>
                </div>
            </header>

            <div class="content-area">
                <!-- Welcome/Empty State -->
                <div id="empty-state" class="hero-state">
                    <div class="hero-icon">
                        <i class="fa-solid fa-wand-magic-sparkles"></i>
                    </div>
                    <h3>Welcome to Grading System</h3>
                    <p>Select a semester from the sidebar to begin managing your student records.</p>
                </div>

                <!-- No Subjects State -->
                <div id="no-subjects-state" class="hero-state" style="display:none;">
                    <i class="fa-solid fa-book-bookmark"></i>
                    <h3>Ready to teach?</h3>
                    <p>Add your first subject to this semester to start recording grades.</p>
                </div>

                <!-- Student Table Section -->
                <div id="table-section" class="table-container-glass" style="display:none;">
                    <div class="table-header-controls">
                        <div class="search-box">
                            <i class="fa-solid fa-magnifying-glass"></i>
                            <input type="text" id="search-input" placeholder="Search by name...">
                        </div>
                        <div class="filter-group">
                            <select id="filter-year" class="glass-filter">
                                <option value="">Year Level</option>
                            </select>
                            <select id="filter-section" class="glass-filter">
                                <option value="">Section</option>
                            </select>
                        </div>
                    </div>

                    <div class="table-responsive">
                        <table id="student-table">
                            <thead>
                                <tr id="table-header"></tr>
                            </thead>
                            <tbody id="table-body"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Modals (Kept structure but can be styled with glassmorphism in CSS) -->
    <!-- ... [Include your existing modals here] ... -->

    <script src="app.js"></script>
</body>
</html>
